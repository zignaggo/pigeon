<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Pombo — Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Nunito', system-ui, sans-serif; }
  #root { height: 100%; }
  * { box-sizing: border-box; }

  /* Stage that centers the phone and letterboxes on a mode-aware backdrop */
  .pm-stage {
    height: 100vh; width: 100vw; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    transition: background .35s ease;
  }

  @keyframes pmPulse {
    0%   { transform: scale(0.7); opacity: 0.55; }
    70%  { opacity: 0; }
    100% { transform: scale(1.35); opacity: 0; }
  }
  @keyframes pmSweep { to { transform: rotate(360deg); } }
  @keyframes pmFloat {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-4px); }
  }
  @keyframes pmDot {
    0%,100% { opacity: 0.5; transform: scale(0.85); }
    50%     { opacity: 1;   transform: scale(1); }
  }
  @keyframes pmSlideIn  { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes pmSheetUp  { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes pmFadeIn   { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pmScrim    { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pmRise     { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .pm-screen::-webkit-scrollbar { width: 0; height: 0; }
  .pm-screen { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Reused from the desktop concept: tokens, atoms (Avatar/DeviceGlyph/FileIcon) + PEERS data -->
<script type="text/babel" src="pombo-app.jsx"></script>
<script type="text/babel" src="pombo-canvas.jsx"></script>
<!-- iOS device bezel -->
<script type="text/babel" src="ios-frame.jsx"></script>
<!-- Mobile-specific primitives + screens -->
<script type="text/babel" src="pombo-mobile-ui.jsx"></script>
<script type="text/babel" src="pombo-mobile-screens.jsx"></script>

<script type="text/babel" data-presets="react">
  const { useState, useEffect, useRef } = React;

  const TWEAKS = /*EDITMODE-BEGIN*/{
    "accent": "sun",
    "density": "compact",
    "darkMode": true,
    "showConnectionRequest": true
  }/*EDITMODE-END*/;

  const ACCENTS = {
    coral:  { light: ['#E86A4E', '#FBDDCF'], dark: ['#F4836A', '#3E2018'] },
    sun:    { light: ['#F0B94E', '#FBEAC4'], dark: ['#F0BE5E', '#3A2C12'] },
    mint:   { light: ['#4E9E65', '#DCECDF'], dark: ['#A8CDB0', '#1E2D22'] },
    sky:    { light: ['#5A8FA8', '#D7E7EE'], dark: ['#8FBED1', '#1A2A30'] },
    lilac:  { light: ['#9471B5', '#E8DBF0'], dark: ['#C2A4D5', '#2A2034'] },
  };

  function App() {
    const [tweaks, setTweaks] = useState(TWEAKS);
    const [editMode, setEditMode] = useState(false);

    // Synchronous token swap each render so children read current mode/accent.
    const base = tweaks.darkMode ? window.POMBO_DARK : window.POMBO_LIGHT;
    Object.assign(window.PomboTokens, base);
    const ac = ACCENTS[tweaks.accent] || ACCENTS.coral;
    const [accentMain, accentSoft] = tweaks.darkMode ? ac.dark : ac.light;
    window.PomboTokens.coral = accentMain;
    window.PomboTokens.coralSoft = accentSoft;
    window.PMCFG = { compact: tweaks.density === 'compact', dark: tweaks.darkMode };
    const T = window.PomboTokens;

    useEffect(() => {
      const onMsg = (e) => {
        const d = e.data || {};
        if (d.type === '__activate_edit_mode') setEditMode(true);
        if (d.type === '__deactivate_edit_mode') setEditMode(false);
      };
      window.addEventListener('message', onMsg);
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
      return () => window.removeEventListener('message', onMsg);
    }, []);

    const patch = (k, v) => {
      setTweaks((t) => {
        const next = { ...t, [k]: v };
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
        return next;
      });
    };

    return (
      <div className="pm-stage" style={{ background: tweaks.darkMode ? '#0B0907' : '#EDE7DD' }}>
        <PomboMobileApp
          dark={tweaks.darkMode}
          simulateRequest={tweaks.showConnectionRequest}
        />

        {editMode && (
          <div style={{
            position: 'fixed', top: 16, right: 16, width: 264, zIndex: 9999,
            background: T.paper, borderRadius: 14,
            boxShadow: `0 20px 60px rgba(0,0,0,${tweaks.darkMode ? 0.5 : 0.25}), 0 0 0 1px ${T.line}`,
            fontFamily: 'Nunito, system-ui, sans-serif', color: T.ink,
          }}>
            <div style={{ padding: '12px 16px', borderBottom: `1px solid ${T.line}`, display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ width: 10, height: 10, borderRadius: '50%', background: T.coral }}/>
              <strong style={{ fontSize: 13 }}>Tweaks</strong>
              <span style={{ marginLeft: 'auto', fontSize: 11, color: T.inkMute }}>Pombo Mobile</span>
            </div>
            <div style={{ padding: 14, display: 'flex', flexDirection: 'column', gap: 14 }}>
              <div>
                <label style={{ fontSize: 11, color: T.inkMute, textTransform: 'uppercase', letterSpacing: 0.6, fontWeight: 700 }}>Modo</label>
                <div style={{ display: 'flex', marginTop: 8, padding: 3, borderRadius: 12, background: T.cream, border: `1px solid ${T.line}` }}>
                  {[{ id: false, label: 'Claro' }, { id: true, label: 'Escuro' }].map((m) => {
                    const on = tweaks.darkMode === m.id;
                    return (
                      <button key={String(m.id)} onClick={() => patch('darkMode', m.id)} style={{
                        flex: 1, padding: '7px 8px', borderRadius: 9, cursor: 'pointer',
                        background: on ? T.coral : 'transparent', color: on ? '#fff' : T.inkSoft,
                        border: 'none', fontSize: 12, fontWeight: 600, fontFamily: 'inherit',
                      }}>{m.label}</button>
                    );
                  })}
                </div>
              </div>
              <div>
                <label style={{ fontSize: 11, color: T.inkMute, textTransform: 'uppercase', letterSpacing: 0.6, fontWeight: 700 }}>Cor de destaque</label>
                <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                  {Object.keys(ACCENTS).map((k) => {
                    const [m] = tweaks.darkMode ? ACCENTS[k].dark : ACCENTS[k].light;
                    return (
                      <button key={k} onClick={() => patch('accent', k)} style={{
                        width: 32, height: 32, borderRadius: 10, cursor: 'pointer',
                        background: m, border: tweaks.accent === k ? `2px solid ${T.ink}` : '2px solid transparent', padding: 0,
                      }}/>
                    );
                  })}
                </div>
              </div>
              <div>
                <label style={{ fontSize: 11, color: T.inkMute, textTransform: 'uppercase', letterSpacing: 0.6, fontWeight: 700 }}>Densidade</label>
                <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                  {['compact', 'comfortable'].map((d) => (
                    <button key={d} onClick={() => patch('density', d)} style={{
                      flex: 1, padding: '8px 10px', borderRadius: 10, cursor: 'pointer',
                      background: tweaks.density === d ? T.coral : T.cream, color: tweaks.density === d ? '#fff' : T.ink,
                      border: 'none', fontSize: 12, fontWeight: 600, fontFamily: 'inherit',
                    }}>{d === 'compact' ? 'Compacto' : 'Confortável'}</button>
                  ))}
                </div>
              </div>
              <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, cursor: 'pointer', color: T.ink }}>
                <input type="checkbox" checked={tweaks.showConnectionRequest}
                  onChange={(e) => patch('showConnectionRequest', e.target.checked)}/>
                Simular pedido de conexão
              </label>
              <div style={{ fontSize: 11, color: T.inkMute, lineHeight: 1.4, padding: 10, borderRadius: 8, background: T.cream, border: `1px solid ${T.line}` }}>
                Digite um apelido para entrar. Toque num dispositivo para enviar arquivos. Use a aba inferior para navegar.
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
