<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Pombo — Design Canvas</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Nunito', system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="win11-frame.jsx"></script>
<script type="text/babel" src="pombo-app.jsx"></script>
<script type="text/babel" src="pombo-canvas.jsx"></script>
<script type="text/babel" src="pombo-send.jsx"></script>
<script type="text/babel" src="pombo-states.jsx"></script>
<script type="text/babel" src="pombo-variations.jsx"></script>

<script type="text/babel" data-presets="react">
  const { useState, useEffect } = React;

  // ── Tweaks ───────────────────────────────────────────────
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "accent": "lilac",
    "density": "compact",
    "darkMode": true,
    "showConnectionRequest": true
  }/*EDITMODE-END*/;

  const ACCENTS = {
    coral:  { light: ['#E86A4E', '#FBDDCF'], dark: ['#F4836A', '#3E2018'] },
    sun:    { light: ['#F0B94E', '#FBEAC4'], dark: ['#F0BE5E', '#3A2C12'] },
    mint:   { light: ['#4E9E65', '#DCECDF'], dark: ['#A8CDB0', '#1E2D22'] },
    sky:    { light: ['#5A8FA8', '#D7E7EE'], dark: ['#8FBED1', '#1A2A30'] },
    lilac:  { light: ['#9471B5', '#E8DBF0'], dark: ['#C2A4D5', '#2A2034'] },
  };

  function App() {
    const [tweaks, setTweaks] = useState(TWEAKS);
    const [editMode, setEditMode] = useState(false);
    const [selectedPeerId, setSelectedPeerId] = useState('ana');

    // Synchronous token swap — runs every render so PomboTokens reflects
    // the current mode/accent before any child reads it.
    const base = tweaks.darkMode ? window.POMBO_DARK : window.POMBO_LIGHT;
    Object.assign(window.PomboTokens, base);
    const ac = ACCENTS[tweaks.accent] || ACCENTS.coral;
    const [accentMain, accentSoft] = tweaks.darkMode ? ac.dark : ac.light;
    window.PomboTokens.coral = accentMain;
    window.PomboTokens.coralSoft = accentSoft;
    const T = window.PomboTokens;

    useEffect(() => {
      const onMsg = (e) => {
        const d = e.data || {};
        if (d.type === '__activate_edit_mode') setEditMode(true);
        if (d.type === '__deactivate_edit_mode') setEditMode(false);
      };
      window.addEventListener('message', onMsg);
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
      return () => window.removeEventListener('message', onMsg);
    }, []);

    const patch = (k, v) => {
      setTweaks((t) => {
        const next = { ...t, [k]: v };
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
        return next;
      });
    };

    const selectedPeer = PEERS.find((p) => p.id === selectedPeerId) || PEERS[0];

    // Wrap each screen in a Windows 11 window frame sized to the artboard.
    // Backdrop adapts to the active mode for nicer thumbnails on canvas.
    const W = 1100, H = 720;
    const wrap = (screen, extra) => (
      <div style={{
        padding: 24,
        background: tweaks.darkMode ? '#0B0907' : '#EFECE6',
        width: W + 48, height: H + 48,
      }}>
        <Win11Frame width={W} height={H} title="Pombo — Transferência Local">
          {screen}
          {extra}
        </Win11Frame>
      </div>
    );

    return (
      <>
        <DesignCanvas>
          <DCSection id="main" title="Tela principal" subtitle="Mapa de dispositivos por perto — conceito padrão">
            <DCArtboard id="canvas-default" label="A · Mapa — padrão" width={W + 48} height={H + 48}>
              {wrap(<CanvasScreen selectedId={selectedPeerId} onSelect={(p) => setSelectedPeerId(p.id)} />)}
            </DCArtboard>
            <DCArtboard id="canvas-selected" label="B · Mapa — peer selecionado" width={W + 48} height={H + 48}>
              {wrap(<CanvasScreen selectedId="ceci" />)}
            </DCArtboard>
            <DCArtboard id="empty" label="C · Primeira abertura (vazio)" width={W + 48} height={H + 48}>
              {wrap(<EmptyState />)}
            </DCArtboard>
          </DCSection>

          <DCSection id="send" title="Fluxo de envio" subtitle="Do peer selecionado → escolher arquivos → transferir">
            <DCArtboard id="send-picker" label="A · Selecionar arquivos" width={W + 48} height={H + 48}>
              {wrap(<SendScreenPicker peer={PEERS[0]} />)}
            </DCArtboard>
            <DCArtboard id="send-transfer" label="B · Em transferência (anel)" width={W + 48} height={H + 48}>
              {wrap(<SendScreenTransfer peer={PEERS[0]} />)}
            </DCArtboard>
            <DCArtboard id="send-done" label="C · Pedido de conexão (diálogo)" width={W + 48} height={H + 48}>
              {wrap(<CanvasScreen selectedId="ana" />, <ConnectionRequestDialog />)}
            </DCArtboard>
          </DCSection>

          <DCSection id="variations-layout" title="Variações · Layout de peers" subtitle="Como listar dispositivos disponíveis">
            <DCArtboard id="layout-map" label="A · Mapa (padrão)" width={W + 48} height={H + 48}>
              {wrap(<CanvasScreen selectedId="ana" />)}
            </DCArtboard>
            <DCArtboard id="layout-radar" label="B · Radar" width={W + 48} height={H + 48}>
              {wrap(<RadarScreen />)}
            </DCArtboard>
            <DCArtboard id="layout-grid" label="C · Grade de cartões" width={W + 48} height={H + 48}>
              {wrap(<PeerGridScreen />)}
            </DCArtboard>
            <DCArtboard id="layout-list" label="D · Lista compacta" width={W + 48} height={H + 48}>
              {wrap(<PeerListScreen />)}
            </DCArtboard>
          </DCSection>

          <DCSection id="variations-progress" title="Variações · Visualização de progresso" subtitle="Como mostrar a transferência em andamento">
            <DCArtboard id="progress-ring" label="A · Anel + barra (padrão)" width={W + 48} height={H + 48}>
              {wrap(<SendScreenTransfer peer={PEERS[0]} />)}
            </DCArtboard>
            <DCArtboard id="progress-flight" label="B · Voo do pombo" width={W + 48} height={H + 48}>
              {wrap(<DoveFlightProgress peer={PEERS[0]} />)}
            </DCArtboard>
            <DCArtboard id="progress-blocks" label="C · Blocos segmentados" width={W + 48} height={H + 48}>
              {wrap(<SegmentedProgress peer={PEERS[0]} />)}
            </DCArtboard>
          </DCSection>

          <DCSection id="variations-request" title="Variações · Pedido de conexão" subtitle="Estilos para aprovar quem pode te enviar">
            <DCArtboard id="req-modal" label="A · Modal centrado" width={W + 48} height={H + 48}>
              {wrap(<CanvasScreen selectedId="ana" />, <ConnectionRequestDialog />)}
            </DCArtboard>
            <DCArtboard id="req-toast" label="B · Toast no canto" width={W + 48} height={H + 48}>
              {wrap(<CanvasScreen selectedId="ana" />, <ConnectionRequestToast />)}
            </DCArtboard>
          </DCSection>

          <DCSection id="settings" title="Ajustes" subtitle="Nome do dispositivo, visibilidade, pasta de destino">
            <DCArtboard id="settings-main" label="A · Tela de ajustes" width={W + 48} height={H + 48}>
              {wrap(<SettingsScreen />)}
            </DCArtboard>
          </DCSection>
        </DesignCanvas>

        {/* Tweaks panel */}
        {editMode && (
          <div style={{
            position: 'fixed', top: 16, right: 16, width: 270, zIndex: 9999,
            background: T.paper, borderRadius: 14,
            boxShadow: `0 20px 60px rgba(0,0,0,${tweaks.darkMode ? 0.5 : 0.25}), 0 0 0 1px ${T.line}`,
            fontFamily: 'Nunito, system-ui, sans-serif',
            color: T.ink,
          }}>
            <div style={{ padding: '12px 16px', borderBottom: `1px solid ${T.line}`, display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ width: 10, height: 10, borderRadius: '50%', background: T.coral }}/>
              <strong style={{ fontSize: 13 }}>Tweaks</strong>
              <span style={{ marginLeft: 'auto', fontSize: 11, color: T.inkMute }}>Pombo</span>
            </div>
            <div style={{ padding: 14, display: 'flex', flexDirection: 'column', gap: 14 }}>

              {/* Mode segmented */}
              <div>
                <label style={{ fontSize: 11, color: T.inkMute, textTransform: 'uppercase', letterSpacing: 0.6, fontWeight: 700 }}>Modo</label>
                <div style={{
                  display: 'flex', marginTop: 8, padding: 3, borderRadius: 12,
                  background: T.cream, border: `1px solid ${T.line}`,
                }}>
                  {[
                    { id: false, label: 'Claro', icon: <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="6" cy="6" r="2.2"/><path d="M6 1v1.5M6 9.5V11M1 6h1.5M9.5 6H11M2.5 2.5l1 1M8.5 8.5l1 1M2.5 9.5l1-1M8.5 3.5l1-1"/></svg> },
                    { id: true,  label: 'Escuro', icon: <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M10 7A4.5 4.5 0 0 1 5 2a4.5 4.5 0 1 0 5 5z"/></svg> },
                  ].map((m) => {
                    const on = tweaks.darkMode === m.id;
                    return (
                      <button key={String(m.id)} onClick={() => patch('darkMode', m.id)} style={{
                        flex: 1, padding: '7px 8px', borderRadius: 9, cursor: 'pointer',
                        background: on ? T.coral : 'transparent',
                        color: on ? '#fff' : T.inkSoft,
                        border: 'none', fontSize: 12, fontWeight: 600, fontFamily: 'inherit',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                      }}>{m.icon}{m.label}</button>
                    );
                  })}
                </div>
              </div>

              <div>
                <label style={{ fontSize: 11, color: T.inkMute, textTransform: 'uppercase', letterSpacing: 0.6, fontWeight: 700 }}>Cor de destaque</label>
                <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                  {Object.keys(ACCENTS).map((k) => {
                    const [m] = tweaks.darkMode ? ACCENTS[k].dark : ACCENTS[k].light;
                    return (
                      <button key={k} onClick={() => patch('accent', k)} style={{
                        width: 32, height: 32, borderRadius: 10, cursor: 'pointer',
                        background: m, border: tweaks.accent === k ? `2px solid ${T.ink}` : '2px solid transparent',
                        padding: 0,
                      }}/>
                    );
                  })}
                </div>
              </div>

              <div>
                <label style={{ fontSize: 11, color: T.inkMute, textTransform: 'uppercase', letterSpacing: 0.6, fontWeight: 700 }}>Densidade</label>
                <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                  {['compact', 'comfortable'].map((d) => (
                    <button key={d} onClick={() => patch('density', d)} style={{
                      flex: 1, padding: '8px 10px', borderRadius: 10, cursor: 'pointer',
                      background: tweaks.density === d ? T.coral : T.cream,
                      color: tweaks.density === d ? '#fff' : T.ink,
                      border: 'none', fontSize: 12, fontWeight: 600, fontFamily: 'inherit',
                    }}>{d === 'compact' ? 'Compacto' : 'Confortável'}</button>
                  ))}
                </div>
              </div>

              <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, cursor: 'pointer', color: T.ink }}>
                <input type="checkbox" checked={tweaks.showConnectionRequest}
                  onChange={(e) => patch('showConnectionRequest', e.target.checked)}/>
                Simular pedido de conexão
              </label>

              <div style={{ fontSize: 11, color: T.inkMute, lineHeight: 1.4, padding: 10, borderRadius: 8, background: T.cream, border: `1px solid ${T.line}` }}>
                Tudo no canvas reage em tempo real. Clique na seta no canto de um artboard pra entrar em modo foco (← / → para navegar).
              </div>
            </div>
          </div>
        )}
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
